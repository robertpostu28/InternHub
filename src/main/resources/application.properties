spring.application.name=InternHub

server.port=8080

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/internhub}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:internhub}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:internhub}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=true

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.validate-migration-naming=true

app.azure.connection-string=${AZURE_STORAGE_CONNECTION_STRING:DefaultEndpointsProtocol=http;AccountName=devstoreaccount1;AccountKey=Eby8vdM02xNOcqFlqUwJPLlmEtlCDXJ1OUzFT50uSRZ6IFsuFq2UVErCz4I6tq/K1SZFPTOtr/KBHBeksoGMGw==;BlobEndpoint=http://127.0.0.1:10000/devstoreaccount1;}
app.azure.container=${AZURE_STORAGE_CONTAINER_NAME:cvs}

logging.level.com.azure=INFO

spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB